name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.22", "1.23", "1.24"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - run: go vet ./...
      - run: go test -v -race -count=1 ./...

  build:
    name: Build (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]
        include:
          - os: linux
            arch: "386"
          - os: windows
            arch: "386"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build redir
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          EXT=""
          if [ "${{ matrix.os }}" = "windows" ]; then EXT=".exe"; fi
          go build -o "redir-${{ matrix.os }}-${{ matrix.arch }}$EXT" ./cmd/redir/
      - uses: actions/upload-artifact@v4
        with:
          name: redir-${{ matrix.os }}-${{ matrix.arch }}
          path: redir-*

  release-artifacts:
    name: Upload Release Artifacts
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Upload to Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for dir in artifacts/*/; do
            for file in "$dir"/*; do
              if [ -f "$file" ]; then
                gh release upload "${{ github.event.release.tag_name }}" "$file"
              fi
            done
          done
